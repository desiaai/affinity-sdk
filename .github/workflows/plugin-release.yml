name: Release MCP Plugin

on:
  push:
    tags: ["mcp-v*.*.*"]  # Renamed from plugin-v*
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (without prefix, for API trigger)"
        required: false
        type: string
      triggered_by:
        description: "What triggered this release"
        required: false
        type: string
        default: "manual"
      tag:
        description: 'Tag to release manually (e.g., mcp-v1.0.0, ignored if version set)'
        required: false

permissions:
  contents: write
  id-token: write  # Required for MCP Registry OIDC auth

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Determine version and tag
        id: version
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.version }}" ]]; then
            # API-triggered release (from release-detect)
            # Note: Version validation happens post-checkout in "Validate version matches VERSION file" step
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag_name=mcp-v${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "is_api_trigger=true" >> $GITHUB_OUTPUT
            echo "Mode: workflow_dispatch (API), version=${{ inputs.version }}, triggered_by=${{ inputs.triggered_by }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            # Tag push
            TAG_NAME="${GITHUB_REF_NAME}"
            VERSION="${TAG_NAME#mcp-v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "is_api_trigger=false" >> $GITHUB_OUTPUT
            echo "Mode: tag push, tag=$TAG_NAME, version=$VERSION"
          else
            # Manual workflow_dispatch with tag input
            TAG_NAME="${{ inputs.tag }}"
            if [[ -z "$TAG_NAME" ]]; then
              echo "::error::Manual dispatch requires either 'version' or 'tag' input"
              exit 1
            fi
            VERSION="${TAG_NAME#mcp-v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "is_api_trigger=false" >> $GITHUB_OUTPUT
            echo "Mode: workflow_dispatch (manual), tag=$TAG_NAME, version=$VERSION"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.version.outputs.is_api_trigger == 'true' && 'main' || (github.event.inputs.tag || github.ref) }}

      - name: Validate version matches VERSION file
        run: |
          set -euo pipefail
          FILE_VERSION=$(cat mcp/VERSION | tr -d '[:space:]')
          INPUT_VERSION="${{ steps.version.outputs.version }}"
          if [[ "$FILE_VERSION" != "$INPUT_VERSION" ]]; then
            echo "::error::Version mismatch: mcp/VERSION=$FILE_VERSION, expected=$INPUT_VERSION"
            exit 1
          fi
          echo "Version validated: $FILE_VERSION"

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Install mcp-bash framework
        run: |
          # Source version and commit from lockfile (single source of truth)
          source mcp/mcp-bash.lock
          echo "Installing mcp-bash v${MCPBASH_VERSION} (${MCPBASH_COMMIT})"
          curl -fsSL https://raw.githubusercontent.com/yaniv-golan/mcp-bash-framework/main/install.sh | \
            bash -s -- --version "v${MCPBASH_VERSION}" --yes
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          # Verify installed commit matches lockfile
          INSTALLED_COMMIT=$(git -C "${XDG_DATA_HOME:-$HOME/.local/share}/mcp-bash" rev-parse HEAD)
          if [[ "$INSTALLED_COMMIT" != "$MCPBASH_COMMIT" ]]; then
            echo "::error::mcp-bash commit mismatch: expected $MCPBASH_COMMIT, got $INSTALLED_COMMIT"
            exit 1
          fi

      - name: Verify mcp-bash installation
        run: mcp-bash --version

      - name: Build Claude Code plugin ZIP
        run: |
          cd mcp
          make plugin
          echo "Plugin version: $(cat .claude-plugin/VERSION)"
          ls -la .claude-plugin/xaffinity-mcp-plugin.zip

      - name: Validate MCPB configuration
        run: |
          cd mcp
          mcp-bash bundle --validate

      - name: Build MCPB bundle
        run: |
          cd mcp
          mcp-bash bundle --output dist --verbose
          ls -la dist/*.mcpb

      - name: Validate MCPB bundle structure
        run: |
          cd mcp
          MCPB_FILE=$(ls dist/*.mcpb | head -1)
          unzip -t "$MCPB_FILE"
          unzip -p "$MCPB_FILE" manifest.json | jq .
          echo "MCPB bundle validated"

      - name: Test MCPB bundle health check
        run: |
          cd mcp
          MCPB_FILE=$(ls dist/*.mcpb | head -1)
          EXTRACT_DIR=$(mktemp -d)
          unzip -q "$MCPB_FILE" -d "$EXTRACT_DIR"
          "$EXTRACT_DIR/server/run-server.sh" --health || echo "Health check not available (expected if CLI not configured)"
          rm -rf "$EXTRACT_DIR"

      - name: Create and push tag (API trigger only)
        if: steps.version.outputs.is_api_trigger == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag_name }}" -m "Release ${{ steps.version.outputs.tag_name }}"
          git push origin "${{ steps.version.outputs.tag_name }}"

      - name: Set up Python for release notes
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate release notes
        shell: bash
        env:
          MCP_RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python tools/generate_release_notes.py \
            --version "$MCP_RELEASE_VERSION" \
            --type mcp \
            --output release_notes.md

      - name: Validate MCP Registry metadata consistency
        run: python tools/validate_mcp_registry_metadata.py --verbose

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          files: |
            mcp/.claude-plugin/xaffinity-mcp-plugin.zip
            mcp/dist/*.mcpb
          name: MCP Server ${{ steps.version.outputs.tag_name }}
          body_path: release_notes.md

      # ------------------------------------------------------------------
      # Publish to MCP Registry (non-blocking)
      # ------------------------------------------------------------------
      # These steps run AFTER the GitHub Release is created so the MCPB
      # download URL is live before the registry points to it.
      # All steps use continue-on-error so a registry outage does not
      # fail the release.

      - name: Load mcp-publisher version from lock file
        id: publisher-version
        run: |
          source mcp/mcp-publisher.lock
          echo "MCP_PUBLISHER_VERSION=${MCP_PUBLISHER_VERSION}" >> "$GITHUB_ENV"
          echo "Using mcp-publisher ${MCP_PUBLISHER_VERSION}"

      - name: Install mcp-publisher
        continue-on-error: true
        id: install-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          ./mcp-publisher --help > /dev/null 2>&1
          echo "mcp-publisher installed successfully"

      - name: Prepare server.json for MCP Registry
        if: steps.install-publisher.outcome == 'success'
        continue-on-error: true
        id: prepare-server-json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MCPB_FILE=$(ls mcp/dist/*.mcpb | head -1)
          SHA256=$(openssl dgst -sha256 -r "$MCPB_FILE" | awk '{print $1}')
          DOWNLOAD_URL="https://github.com/yaniv-golan/affinity-sdk/releases/download/mcp-v${VERSION}/xaffinity-mcp-${VERSION}.mcpb"

          jq --arg v "$VERSION" \
             --arg url "$DOWNLOAD_URL" \
             --arg sha "$SHA256" \
             '.version = $v
              | .packages[0].version = $v
              | .packages[0].identifier = $url
              | .packages[0].fileSha256 = $sha' \
             mcp/server.json > server.json

          echo "server.json prepared for MCP Registry:"
          cat server.json

      - name: Authenticate to MCP Registry
        if: steps.prepare-server-json.outcome == 'success'
        continue-on-error: true
        id: registry-auth
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        if: steps.registry-auth.outcome == 'success'
        continue-on-error: true
        id: registry-publish
        run: ./mcp-publisher publish

      - name: MCP Registry publish status
        if: always()
        run: |
          if [[ "${{ steps.registry-publish.outcome }}" == "success" ]]; then
            echo "::notice::MCP Registry publish completed successfully"
          elif [[ "${{ steps.install-publisher.outcome }}" != "success" ]]; then
            echo "::warning::MCP Registry publish skipped: mcp-publisher install failed"
          elif [[ "${{ steps.prepare-server-json.outcome }}" != "success" ]]; then
            echo "::warning::MCP Registry publish skipped: server.json preparation failed"
          elif [[ "${{ steps.registry-auth.outcome }}" != "success" ]]; then
            echo "::warning::MCP Registry publish skipped: OIDC authentication failed"
          else
            echo "::warning::MCP Registry publish failed (non-blocking)"
          fi
